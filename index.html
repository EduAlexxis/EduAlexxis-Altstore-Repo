<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAlexxis Apps Repository</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            background-color: #2c2c2e;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
        }
        img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px;
        }
        p {
            color: #aeaeb2;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .button {
            display: block;
            background-color: #0b84ff;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }
        .button:hover {
            background-color: #0070e0;
        }
        
        .sidestore { background-color: #bc36eb; }
        .sidestore:hover { background-color: #a02bd3; }
        
        .livecontainer { background-color: #ff3b30; }
        .livecontainer:hover { background-color: #d63328; }
        
        .scarlet { background-color: #ff2d55; }
        .scarlet:hover { background-color: #d82648; }

        .raw { background-color: #3a3a3c; }
        .raw:hover { background-color: #2c2c2e; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://avatars.githubusercontent.com/u/64240653?v=4" alt="EduAlexxis Profile">
    <h1>EduAlexxis Apps</h1>
    <p>Tap a button below to add this repository directly to your sideloading app.</p>

    <!-- AltStore Link -->
    <a href="altstore://source?url=https://raw.githubusercontent.com/EduAlexxis/EduAlexxis-Altstore-Repo/main/apps.json" class="button">Add to AltStore</a>
    
    <!-- SideStore Link -->
    <a href="sidestore://source?url=https://raw.githubusercontent.com/EduAlexxis/EduAlexxis-Altstore-Repo/main/apps.json" class="button sidestore">Add to SideStore</a>

    <!-- Scarlet Link -->
    <!-- Scarlet uses standard altstore json format too via scheme -->
    <a href="scarlet://source?url=https://raw.githubusercontent.com/EduAlexxis/EduAlexxis-Altstore-Repo/main/apps.json" class="button scarlet">Add to Scarlet</a>
    
    <!-- Fallback / Copy URL -->
    <a href="https://raw.githubusercontent.com/EduAlexxis/EduAlexxis-Altstore-Repo/main/apps.json" class="button raw">View Raw Source JSON</a>
</div>

</body>
</html>
